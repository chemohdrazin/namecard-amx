<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card - Dato' Ir. Devan Iyavoo</title>
    <!-- FontAwesome untuk ikon butang -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* Bekas Luar untuk Memastikan Sentiasa di Tengah (Terutamanya di Telefon) */
        .wrapper {
            width: 100%;
            max-width: 550px;
            perspective: 1000px;
        }

        /* Reka Bentuk Fizikal Kad (Sama Saiz & Nisbah Kad Perniagaan) */
        .business-card {
            background: #ffffff;
            width: 100%;
            aspect-ratio: 1.58 / 1; /* Nisbah Standard Kad Kredit/Kad Perniagaan */
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 32, 91, 0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            padding: 25px;
            border: 1px solid #e1e8f0;
        }

        /* Elemen Grafik Melengkung AMX (Biru & Merah) di Sebelah Kiri */
        .business-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 32%;
            height: 100%;
            background: linear-gradient(135deg, #00205b 0%, #00153d 100%);
            clip-path: polygon(0 0, 100% 0, 75% 100%, 0 100%);
            z-index: 1;
        }

        .business-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 33.5%;
            height: 100%;
            background: #e31b23;
            clip-path: polygon(0 0, 100% 0, 75% 100%, 0 100%);
            z-index: 0;
            opacity: 0.8;
        }

        /* Bahagian Kiri Kad (Logo & Slogan) */
        .card-left {
            width: 30%;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #ffffff;
            padding-right: 10px;
        }

        .logo-area {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        .logo-area span {
            color: #e31b23;
        }

        .tagline {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #d1dcf0;
            line-height: 1.4;
            font-weight: 600;
        }

        /* Bahagian Kanan Kad (Maklumat Pengarah & Hubungan) */
        .card-right {
            width: 70%;
            padding-left: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 2;
        }

        .profile-section {
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 8px;
        }

        .name {
            font-size: 18px;
            font-weight: 700;
            color: #00205b;
        }

        .designation {
            font-size: 10px;
            text-transform: uppercase;
            color: #e31b23;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .company {
            font-size: 9px;
            font-weight: 600;
            color: #666;
            margin-top: 1px;
        }

        /* Senarai Hubungan yang Boleh Ditekan */
        .contact-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 12px;
            margin-top: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #444;
            font-size: 10.5px;
            transition: all 0.2s ease;
            padding: 4px 6px;
            border-radius: 6px;
            background: #f8fafd;
            border: 1px solid #eef2f7;
        }

        .contact-item i {
            width: 18px;
            font-size: 12px;
            margin-right: 8px;
            text-align: center;
        }

        /* Warna Ikon Mengikut Fungsi */
        .icon-whatsapp { color: #25D366; }
        .icon-phone { color: #00205b; }
        .icon-email { color: #e31b23; }
        .icon-web { color: #00a8ff; }
        .icon-map { color: #666; }

        /* Kesan Hover (Bila jari sentuh / tetikus lalu) */
        .contact-item:hover {
            background: #eef4ff;
            border-color: #00205b;
            color: #00205b;
            transform: translateY(-1px);
        }

        .address-item {
            grid-column: span 2;
            font-size: 9px;
            color: #777;
            line-height: 1.3;
            background: transparent;
            border: none;
            padding: 0;
            display: flex;
            align-items: flex-start;
        }
        
        .address-item:hover {
            background: transparent;
            transform: none;
            color: #777;
        }

        .address-item i {
            margin-top: 2px;
        }

        /* Paparan Responsif untuk Telefon Pintar Skrin Kecil */
        @media (max-width: 480px) {
            .business-card {
                aspect-ratio: auto;
                flex-direction: column;
                padding: 20px;
            }
            .business-card::before, .business-card::after {
                width: 100%;
                height: 65px;
                clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            }
            .card-left {
                width: 100%;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                height: 35px;
                margin-bottom: 15px;
            }
            .card-right {
                width: 100%;
                padding-left: 0;
            }
            .contact-details {
                grid-template-columns: 1fr;
                gap: 6px;
            }
            .address-item {
                grid-column: span 1;
            }
            .tagline {
                text-align: right;
                font-size: 7px;
            }
        }
    </style>
</head>
<body>
